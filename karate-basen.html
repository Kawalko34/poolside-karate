<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0e1e">
<title>Poolside Karate</title>
<style>
  html{overscroll-behavior:none;}
  body{margin:0;background:linear-gradient(160deg,#111433 0%,#0b0e1e 55%,#141b3d 100%);display:flex;flex-direction:column;align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#fff;min-height:100vh;
    overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
  body.touchmode{position:fixed;inset:0;width:100%;}
  h1{margin:16px 0 4px;letter-spacing:4px;font-weight:800;font-size:clamp(15px,4.6vw,26px);white-space:nowrap;max-width:100vw;overflow:hidden;
    background:linear-gradient(90deg,#ffd43b,#ff9c00 40%,#ff5fa2);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 10px rgba(255,156,0,.35));}
  @media (max-width:600px){ h1{font-size:14px;letter-spacing:2px;} #hint{display:none;} }
  #info{color:#8fa3d9;font-size:13px;margin-bottom:12px;letter-spacing:.3px;}
  #info b{color:#dfe7ff;font-weight:600;}
  canvas{background:#87ceeb;border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.08);
    width:min(960px,98vw);height:auto;touch-action:none;}
  #hint{color:#55618a;font-size:12px;margin-top:10px;}
  #touch{display:none;position:fixed;left:0;right:0;bottom:10px;z-index:9;justify-content:space-between;padding:0 8px;pointer-events:none;}
  .tgroup{display:flex;gap:8px;}
  .tbtn{pointer-events:auto;width:60px;height:60px;border-radius:50%;background:rgba(18,24,48,.42);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border:1.5px solid rgba(255,255,255,.35);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.18);
    user-select:none;-webkit-user-select:none;touch-action:none;transition:transform .08s ease,background .08s ease;}
  .tbtn:active{background:rgba(255,255,255,.34);transform:scale(.9);}
  body.touchmode #touch{display:flex;}
  body.touchmode #info{display:none;}
  #topbtns{display:none;position:fixed;top:calc(6px + env(safe-area-inset-top));right:calc(8px + env(safe-area-inset-right));z-index:11;gap:8px;}
  body.touchmode #topbtns{display:flex;}
  #topbtns .tbtn{width:44px;height:44px;font-size:19px;}
  /* iPhone / dotyk: gra na cały ekran, canvas dopasowany, przyciski na wierzchu */
  body.touchmode{justify-content:flex-start;min-height:100vh;min-height:100dvh;overflow:hidden;padding:0;}
  body.touchmode h1{display:none;}
  body.touchmode #hint{display:none;}
  /* przyciski w osobnym pasku POD grą — nigdy nie zasłaniają akcji */
  body.touchmode canvas{width:100vw;height:calc(100dvh - 60px - env(safe-area-inset-bottom));max-width:none;aspect-ratio:auto;border-radius:0;box-shadow:none;}
  body.touchmode #touch{bottom:0;background:rgba(8,10,24,.78);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border-top:1px solid rgba(255,255,255,.14);
    padding:6px calc(8px + env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));}
  body.touchmode .tgroup{gap:7px;}
  body.touchmode #touch .tbtn{width:48px;height:48px;font-size:19px;}
  @media (orientation:portrait) and (max-width:900px){
    body.touchmode #rotate{display:flex;}
  }
  #rotate{display:none;position:fixed;inset:0;z-index:20;background:#12121f;color:#fff;
    flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:20px;gap:14px;}
  #rotate .big{font-size:52px;animation:spin 2s ease-in-out infinite;}
  @keyframes spin{0%,100%{transform:rotate(-90deg)}50%{transform:rotate(0deg)}}
</style>
</head>
<body>
<h1>🥋 POOLSIDE KARATE 🏊‍♀️</h1>
<div id="info"><b>←/→</b> or <b>A/D</b> — move &nbsp;·&nbsp; <b>W/↑</b> — jump &nbsp;·&nbsp; <b>J</b> — punch 👊 &nbsp;·&nbsp; <b>K</b> — kick 🦵 &nbsp;·&nbsp; <b>S</b> — block 🛡️ &nbsp;·&nbsp; <b>L</b> — super ⚡ &nbsp;·&nbsp; <b>M</b> — music &nbsp;·&nbsp; <b>P</b> — pause &nbsp;·&nbsp; <b>R</b> — restart</div>
<canvas id="c" width="960" height="540"></canvas>
<div id="topbtns">
  <div class="tbtn" data-act="pause">⏸</div>
  <div class="tbtn" data-act="music">🎵</div>
  <div class="tbtn" data-act="restart">🔄</div>
</div>
<div id="touch">
  <div class="tgroup">
    <div class="tbtn" data-k="arrowleft">◀</div>
    <div class="tbtn" data-k="arrowright">▶</div>
    <div class="tbtn" data-k="w">⬆</div>
  </div>
  <div class="tgroup">
    <div class="tbtn" data-k="s">🛡️</div>
    <div class="tbtn" data-k="j">👊</div>
    <div class="tbtn" data-k="k">🦵</div>
    <div class="tbtn" data-k="l">⚡</div>
  </div>
</div>
<div id="hint">Greg, save Natalka! Watch out for Mr Arek…</div>
<div id="rotate"><div class="big">📱</div><div>Rotate your phone<br>to play 🥋</div></div>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const W = 960, H = 540;
// retina: rysuj w wyższej rozdzielczości, wyświetlaj przez CSS
const DPR = Math.min(2, window.devicePixelRatio || 1);
let VW = W, OX = 0; // na telefonie widok poszerzony do proporcji ekranu (pełny ekran bez pasów)
function fitViewport(){
  if(touchUI){
    // mierz realny box canvasu (CSS: 100vw × wysokość ekranu minus pasek przycisków)
    const r = cv.getBoundingClientRect();
    const cw = r.width || (window.innerWidth||W);
    const chh = Math.max(120, r.height || (window.innerHeight||H));
    const aspect = Math.min(3.2, Math.max(16/9, cw / chh));
    VW = Math.round(H * aspect);
    OX = Math.round((VW - W) / 2);
  } else { VW = W; OX = 0; }
  cv.width = VW*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
const GROUND = 470;
const POOL = {x: 700, w: 260, top: GROUND - 6, depth: 60};

// fabuła + tryb dotykowy (deklaracje wcześnie — używane w kodzie startowym)
let storyIdx = 0, storyLast = 0, storyCast = null, touchUI = false;
const STORY = [
  {t:'POOLSIDE KARATE',  s:'A quiet, sunny afternoon at the Palm Cove pool. Natalka is enjoying the sunshine with a good book…'},
  {t:'TROUBLE ARRIVES',  s:'Mr Arek and his gang storm the deck. “Throw the girl in the pool, boys. NOBODY reads at MY pool.”'},
  {t:'ONE HERO STANDS',  s:'Greg — the white warrior — steps out of the shade. “Pick on someone your own size.” FIGHT!'}
];

// ---------- audio ----------
let AC = null;
function unlockAudio(){
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state === 'suspended') AC.resume();
  }catch(e){}
}
function beep(freq, dur, type='square', vol=0.08, slide=0){
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state === 'suspended') AC.resume();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), AC.currentTime+dur);
    g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
const sndPunch = ()=>beep(160,0.08,'square',0.1,-80);
const sndKick  = ()=>beep(110,0.14,'sawtooth',0.12,-60);
const sndHurt  = ()=>beep(300,0.12,'triangle',0.1,-200);
const sndSplash= ()=>{beep(600,0.4,'sawtooth',0.06,-500);beep(200,0.5,'triangle',0.08,-150);};
const sndWin   = ()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.08),i*140));};
const sndLose  = ()=>{[400,350,300,200].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'sawtooth',0.08),i*180));};

// ---------- muzyka ----------
let musicOn = true, musicStep = 0;
const BASS = [110,110,110,110, 87.3,87.3,87.3,87.3, 98,98,98,98, 110,110,98,87.3];
const LEAD = [220,0,261.6,293.7, 329.6,0,293.7,261.6, 220,0,196,220, 261.6,0,329.6,0];
setInterval(()=>{
  if(!musicOn || !AC || state!=='fight' || document.hidden) return;
  const b = BASS[musicStep % 16], l = LEAD[musicStep % 16];
  if(b) beep(b, 0.13, 'triangle', 0.045);
  if(l) beep(l, 0.11, 'square', 0.028);
  if(musicStep % 4 === 2) beep(5000, 0.02, 'square', 0.012); // hi-hat
  musicStep++;
}, 145);

// ---------- input ----------
const keys = {};
function anyKeyAction(){
  if(state==='story' && Date.now() - storyLast > 350){
    storyLast = Date.now();
    storyIdx++;
    if(storyIdx >= STORY.length) state = 'fight';
  }
}
addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if(['arrowleft','arrowright','arrowup',' '].includes(k)) e.preventDefault();
  anyKeyAction();
  if(k==='m') musicOn = !musicOn;
  if(k==='p' && state==='fight') paused = !paused;
  if(k==='r'){ paused = false; init(); }
});
addEventListener('keyup', e=>keys[e.key.toLowerCase()] = false);

// odblokuj audio na iOS/Android przy pierwszym geście
['pointerdown','touchstart','keydown'].forEach(ev=>
  addEventListener(ev, unlockAudio, {once:false, passive:true}));

// sterowanie dotykowe
if(('ontouchstart' in window) || navigator.maxTouchPoints > 0 || location.search.includes('touch=1')){
  document.body.classList.add('touchmode');
  touchUI = true;
}
fitViewport();
addEventListener('resize', fitViewport);
addEventListener('orientationchange', ()=>setTimeout(fitViewport, 200));
// blokuj gesty przewijania/zoomu na urządzeniach dotykowych
addEventListener('touchmove', e=>{ if(document.body.classList.contains('touchmode')) e.preventDefault(); }, {passive:false});
document.addEventListener('gesturestart', e=>e.preventDefault());
addEventListener('dblclick', e=>e.preventDefault());
document.querySelectorAll('.tbtn').forEach(b=>{
  const k = b.dataset.k;
  const on = e=>{ e.preventDefault(); keys[k] = true; anyKeyAction(); };
  const off = e=>{ e.preventDefault(); keys[k] = false; };
  b.addEventListener('pointerdown', on);
  b.addEventListener('pointerup', off);
  b.addEventListener('pointercancel', off);
  b.addEventListener('pointerleave', off);
});
// tap w canvas = start / restart po końcu gry
cv.addEventListener('pointerdown', ()=>{
  if(state==='story') anyKeyAction();
  else if((state==='win' && cut && cut.phase==='end') || (state==='lose' && cut && cut.phase==='girlSunk')) init();
});
// górne przyciski (pauza / muzyka / restart)
document.querySelectorAll('#topbtns .tbtn').forEach(b=>{
  b.addEventListener('pointerdown', e=>{
    e.preventDefault(); unlockAudio();
    const a = b.dataset.act;
    if(a==='pause'){ if(state==='fight') paused = !paused; }
    else if(a==='music'){ musicOn = !musicOn; b.style.opacity = musicOn ? '1' : '0.4'; }
    else if(a==='restart'){ paused = false; init(); }
  });
});

// ---------- fighters ----------
const CHAR_SCALE = 1.42; // większe, bardziej widoczne postacie
function mkFighter(x, opts){
  const f = Object.assign({
    x, y: GROUND, vx:0, vy:0, onGround:true,
    facing:1, scale:1, color:'#111', beltColor:null,
    hp:30, maxHp:30, dmgPunch:6, dmgKick:10, speed:1.6,
    pose:'idle', poseT:0, attackCd:0, hurtT:0, dead:false, invuln:0, blocking:false, ranged:false,
    walkT:0, rot:0, carried:false, isArek:false, name:'', pooled:false, pooledSunk:false,
    mass:1, cdBase:1.3, specialCd:0, slamAir:false, squash:0, moveVx:0,
    koT:0, stopOff: Math.random()*10
  }, opts);
  f.scale *= CHAR_SCALE;
  return f;
}

let player, enemies, arek, girl, wave, state, cut, particles, hearts, splashes, msgT, shake, time;
let score, combo, comboT, hitStop, popups, shocks, items, balls, paused = false;
let superCharge = 0, flashT = 0, hitFx = [];
let camPunch = 0, slowmo = 0, dustT = 0, dmgVig = 0, hpShown = 1, hpGhost = 1;
const store = (typeof localStorage !== 'undefined') ? localStorage : {getItem:()=>null, setItem:()=>{}};
let hiScore = parseInt(store.getItem('karateBasenHi') || '0', 10);

function addPopup(x, y, txt, color){
  popups.push({x, y, txt, color, life: 1.0, vy: -1.4});
}
function addScore(n, x, y){
  score += n * (1 + Math.min(combo, 10) * 0.1) | 0;
  if(x !== undefined) addPopup(x, y, '+' + n, '#ffd43b');
  if(score > hiScore){ hiScore = score; store.setItem('karateBasenHi', String(hiScore)); }
}

function init(){
  time = 0; shake = 0;
  state = 'story'; storyIdx = 0;
  particles = []; hearts = []; splashes = [];
  score = 0; combo = 0; comboT = 0; hitStop = 0; popups = []; shocks = []; items = []; balls = []; paused = false;
  superCharge = 0; flashT = 0; hitFx = []; camPunch = 0; slowmo = 0; dustT = 0; dmgVig = 0; hpShown = 1; hpGhost = 1;
  player = mkFighter(140, {color:'#f5f5f5', beltColor:'#111', hp:140, maxHp:140, facing:1, speed:3.15, name:'GREG',
    dmgPunch:14, dmgKick:20});
  girl = {x: POOL.x - 28, y: GROUND, panicT:0, saved:false, runT:0, yOff:0, rot:0, vx:0, vy:0, sunk:false};
  wave = 0; enemies = []; arek = null;
  cut = null; msgT = 0;
  spawnWave();
  // obsada do plansz fabularnych
  storyCast = { arek: mkFighter(520, {color:'#0a0a0a', beltColor:'#c00', scale:1.75, isArek:true,
    facing:1, name:'MR AREK', pose:'punch', poseT:0.09}) };
}

const TYPES = {
  zbir:   {color:'#111',    belt:'#333', hp:24, spd:[1.1,1.5],  dmgP:4,  dmgK:6,  scale:1,    mass:1,   cd:2.0},
  szybki: {color:'#26323e', belt:'#09f', hp:16, spd:[1.9,2.3],  dmgP:3,  dmgK:5,  scale:0.88, mass:0.8, cd:1.4},
  gruby:  {color:'#000',    belt:'#960', hp:52, spd:[0.75,0.9], dmgP:8,  dmgK:11, scale:1.32, mass:2.3, cd:2.4},
  miotacz:{color:'#173a3a', belt:'#0aa', hp:18, spd:[1.4,1.7],  dmgP:3,  dmgK:5,  scale:0.95, mass:0.9, cd:3.0, ranged:true}
};

const WAVES = [
  {label:'WAVE 1',            q:'“Get lost, hero!”',                mobs:['zbir','zbir']},
  {label:'WAVE 2',            q:'“He’s tougher than he looks…”',   mobs:['zbir','szybki','zbir']},
  {label:'WAVE 3',            q:'“STOP HIM. NOW!”',                 mobs:['gruby','miotacz','szybki']},
  {label:'BOSS: MR AREK 💀',  q:'“My pool. Your funeral, Greg.”',   mobs:['arek','miotacz']}
];

function spawnWave(){
  const w = WAVES[wave];
  if(!w) return;
  w.mobs.forEach((type, i) => {
    if(type === 'arek'){
      arek = mkFighter(POOL.x - 60, {color:'#0a0a0a', beltColor:'#c00', scale:1.75, hp:120, maxHp:120,
        dmgPunch:9, dmgKick:13, speed:1.15, isArek:true, facing:-1, name:'MR AREK', mass:4, specialCd:5.5});
      enemies.push(arek);
    } else {
      const t = TYPES[type];
      enemies.push(mkFighter(POOL.x - 40 - i*60, {color:t.color, beltColor:t.belt, hp:t.hp, maxHp:t.hp,
        facing:-1, speed:t.spd[0] + Math.random()*(t.spd[1]-t.spd[0]),
        dmgPunch:t.dmgP, dmgKick:t.dmgK, scale:t.scale, mass:t.mass, cdBase:t.cd, ranged:!!t.ranged}));
    }
  });
  msgT = 2.2;
}

// ---------- combat ----------
function tryAttack(a, targets, kind){
  let dmg = kind==='punch' ? a.dmgPunch : a.dmgKick;
  const air = !a.onGround;
  if(air) dmg = Math.round(dmg * 1.5); // kopniak/cios w powietrzu = mocniejszy
  const range = (kind==='punch' ? 52 : 66) * a.scale;
  let hit = false;
  for(const t of targets){
    if(t.dead || t.hp<=0 || t.invuln>0) continue;
    const dx = t.x - a.x;
    if(Math.abs(dx) < range && Math.sign(dx||1) === a.facing && Math.abs(t.y - a.y) < 80){
      const blocked = (t === player) && t.blocking && Math.sign(a.x - t.x || 1) === t.facing;
      if(blocked){
        t.hp -= Math.ceil(dmg * 0.2);
        t.invuln = 0.3;
        t.vx = a.facing * 1.5;
        burst(t.x + t.facing*18, t.y - 55, '#fff', 6);
        addPopup(t.x, t.y - 112, 'BLOCKED! 🛡️', '#9adcff');
        beep(1300, 0.06, 'square', 0.07);
        hit = true;
        if(t.hp <= 0){ t.dead = true; t.pose = 'ko'; }
        continue;
      }
      t.hp -= dmg;
      t.hurtT = 0.35;
      t.vx = a.facing * (kind==='kick' ? 7 : 3.5) / (t.mass || 1);
      t.pose = 'hit'; t.poseT = 0;
      const hy2 = t.y-60*t.scale;
      burst(t.x, hy2, kind==='kick' ? '#ffb300' : '#fff', 8);
      hitFx.push({x:t.x, y:hy2, r:6*t.scale, life:0.22, big:kind==='kick'}); // błysk uderzenia
      if(a === player) camPunch = Math.max(camPunch, kind==='kick'?0.045:0.03); // uderzeniowy zoom kamery
      hit = true;
      if(t === player){
        t.invuln = 0.7;
        combo = 0;
        dmgVig = 0.6; // czerwona winieta bólu
      } else if(a === player){
        combo++; comboT = 1.4;
        superCharge = Math.min(100, superCharge + (kind==='kick' ? 16 : 12));
        addScore(kind==='kick' ? 15 : 10, t.x, t.y - 90*t.scale);
        if(air) addPopup(t.x, t.y - 115*t.scale, 'AIR HIT!', '#7fd4ff');
      }
      if(t.hp <= 0){
        t.dead = true; t.pose='ko';
        if(a === player){ addScore(25, t.x, t.y - 105*t.scale); burst(t.x, t.y-50*t.scale, '#ffd43b', 14); }
        if(t.isArek && a === player){ // kinowy nokaut bossa — slow-motion + rozbłysk
          slowmo = 1.4; camPunch = Math.max(camPunch, 0.08); flashT = Math.max(flashT, 0.2);
          shake = Math.max(shake, 14);
          hitFx.push({x:t.x, y:t.y-70*t.scale, r:20, life:0.35, big:true});
          burst(t.x, t.y-60*t.scale, '#fff', 22);
        }
      }
      // kopniak przy krawędzi = zbir wpada do basenu!
      if(a === player && kind==='kick' && !t.isArek && t.x > POOL.x - 80 && a.facing === 1){
        t.pooled = true; t.dead = true; t.hp = 0;
        t.onGround = false; t.vx = 5; t.vy = -4.5;
        addScore(50, t.x, t.y - 120*t.scale);
        addPopup(t.x, t.y - 140*t.scale, 'INTO THE POOL! 🌊', '#7fd4ff');
      }
      hitStop = Math.max(hitStop, kind==='kick' ? 0.07 : 0.045);
    }
  }
  if(hit){ (kind==='punch'?sndPunch:sndKick)(); shake = Math.max(shake, kind==='kick'?5:3); }
  else (kind==='punch'?sndPunch:sndKick)();
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*6,vy:-Math.random()*5,life:0.6,color});
}

function doSuper(){
  const p = player;
  if(state!=='fight' || paused || superCharge < 100 || p.dead) return;
  superCharge = 0;
  p.pose = 'kick'; p.poseT = 0;
  flashT = 0.28; shake = Math.max(shake, 14); hitStop = Math.max(hitStop, 0.12);
  beep(150, 0.3, 'sawtooth', 0.14, -100); beep(900, 0.25, 'square', 0.08, 500);
  addPopup(p.x, p.y - 130, '⚡ SUPER KICK! ⚡', '#fff176');
  for(let i=0;i<24;i++){
    const a2 = i/24*Math.PI*2;
    particles.push({x:p.x, y:p.y-45, vx:Math.cos(a2)*6, vy:Math.sin(a2)*4-2, life:0.7, color:'#fff176'});
  }
  for(const e of enemies){
    if(e.dead || e.pooled) continue;
    if(Math.abs(e.x - p.x) < 170){
      e.hp -= 30;
      e.hurtT = 0.5; e.pose = 'hit'; e.poseT = 0;
      e.vx = Math.sign(e.x - p.x || 1) * 11 / (e.mass || 1);
      e.vy = -4; e.onGround = false;
      burst(e.x, e.y - 60*e.scale, '#fff176', 12);
      addScore(40, e.x, e.y - 100*e.scale);
      combo++; comboT = 1.4;
      if(e.hp <= 0){ e.dead = true; e.pose = 'ko'; }
    }
  }
}

function shockwave(a){
  beep(55, 0.4, 'sawtooth', 0.14, -20);
  shake = Math.max(shake, 12);
  shocks.push({x: a.x, r: 14, life: 0.55});
  burst(a.x - 30, GROUND, '#c9b48b', 10);
  burst(a.x + 30, GROUND, '#c9b48b', 10);
  const p = player;
  if(p.onGround && !p.dead && p.invuln <= 0 && Math.abs(p.x - a.x) < 220){
    p.hp -= 8; p.hurtT = 0.5; p.invuln = 0.8; combo = 0; dmgVig = 0.7;
    p.vx = Math.sign(p.x - a.x || 1) * 9; p.vy = -5; p.onGround = false;
    p.pose = 'hit'; p.poseT = 0;
    sndHurt();
    addPopup(p.x, p.y - 110, 'SHOCKWAVE!', '#ff5252');
  }
}

// ---------- update ----------
// stały krok fizyki 60 Hz — identyczne tempo na 60/90/120 Hz (iPhone ProMotion)
const STEP = 1/60;
let last = performance.now(), acc = 0;
function loop(now){
  let frame = (now-last)/1000; last = now;
  if(frame > 0.25) frame = 0.25; // po uśpieniu karty nie przewijaj setek klatek
  if(paused){ draw(); requestAnimationFrame(loop); return; }
  if(hitStop > 0){ hitStop = Math.max(0, hitStop - frame); draw(); requestAnimationFrame(loop); return; }
  if(slowmo > 0) slowmo = Math.max(0, slowmo - frame); // odliczaj w czasie rzeczywistym
  acc += frame * (slowmo > 0 ? 0.35 : 1); // slow-motion przy nokaucie bossa
  let steps = 0;
  while(acc >= STEP && steps < 5){ time += STEP; update(STEP); acc -= STEP; steps++; }
  draw();
  requestAnimationFrame(loop);
}

function update(dt){
  if(shake>0) shake = Math.max(0, shake - dt*30);
  msgT = Math.max(0, msgT - dt);
  girl.panicT += dt;

  particles.forEach(p=>{p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life-=dt;});
  particles = particles.filter(p=>p.life>0);
  hearts.forEach(h=>{h.y-=dt*40; h.life-=dt;});
  hearts = hearts.filter(h=>h.life>0);
  splashes.forEach(s=>{s.x+=s.vx; s.y+=s.vy; s.vy+=0.35; s.life-=dt;});
  splashes = splashes.filter(s=>s.life>0);
  popups.forEach(p=>{p.y += p.vy; p.life -= dt*1.3;});
  popups = popups.filter(p=>p.life>0);
  shocks.forEach(s=>{s.r += dt*650; s.life -= dt;});
  shocks = shocks.filter(s=>s.life>0);
  hitFx.forEach(h=>{h.r += dt*(h.big?280:200); h.life -= dt;});
  hitFx = hitFx.filter(h=>h.life>0);
  camPunch = Math.max(0, camPunch - dt*0.28);
  dmgVig = Math.max(0, dmgVig - dt*1.8);
  // animowany pasek HP: natychmiast spada zielony, biały „ślad" dogania z opóźnieniem
  const hpTarget = player ? Math.max(0, player.hp/player.maxHp) : 1;
  hpShown = hpTarget;
  if(hpGhost > hpShown) hpGhost = Math.max(hpShown, hpGhost - dt*0.6);
  else hpGhost = hpShown;
  if(comboT > 0){ comboT -= dt; if(comboT <= 0) combo = 0; }
  flashT = Math.max(0, flashT - dt);

  if(state==='fight') updateFight(dt);
  else if(state==='lose') updateLose(dt);
  else if(state==='win') updateWin(dt);
}

function physics(f, dt){
  f.x += f.vx + f.moveVx; f.vx *= 0.82;
  if(f.hurtT > 0) f.moveVx *= 0.85;
  if(!f.onGround){ f.vy += 0.55; f.y += f.vy;
    if(f.y>=GROUND){
      const impact = f.vy;
      f.y=GROUND; f.onGround=true; f.vy=0;
      if(impact > 4){ // kurz + przysiad przy lądowaniu
        f.squash = Math.min(0.28, impact * 0.024);
        for(let i=0;i<6;i++) particles.push({x:f.x+(Math.random()-0.5)*18*f.scale, y:GROUND, vx:(Math.random()-0.5)*3, vy:-Math.random()*2, life:0.4, color:'#e0cda8'});
      }
    }
  }
  f.x = Math.max(30, Math.min(POOL.x - 15, f.x));
  f.attackCd = Math.max(0, f.attackCd - dt);
  f.hurtT = Math.max(0, f.hurtT - dt);
  f.invuln = Math.max(0, f.invuln - dt);
  f.squash *= Math.max(0, 1 - dt*9);
  f.poseT += dt;
}

function updateFight(dt){
  // player controls (płynne przyspieszanie i hamowanie)
  const p = player;
  let moving = false, targetVx = 0;
  p.blocking = false;
  if(keys['s'] && p.onGround && p.hurtT<=0 && !['punch','kick'].includes(p.pose)){
    p.blocking = true; p.pose = 'block';
  } else if(p.hurtT<=0 && !['punch','kick'].includes(p.pose) || p.poseT>0.25){
    if(p.pose==='block') p.pose='idle';
    if(keys['arrowleft']||keys['a']){ targetVx = -p.speed; p.facing=-1; moving=true; }
    if(keys['arrowright']||keys['d']){ targetVx = p.speed; p.facing=1; moving=true; }
    if((keys['arrowup']||keys['w']||keys[' ']) && p.onGround){ p.vy=-10.6; p.onGround=false; p.squash=-0.18; }
    if(keys['j'] && p.attackCd<=0){ p.pose='punch'; p.poseT=0; p.attackCd=0.32; p.vx = p.facing*3.2; tryAttack(p, enemies, 'punch'); }
    else if(keys['k'] && p.attackCd<=0){ p.pose='kick'; p.poseT=0; p.attackCd=0.55; p.vx = p.facing*4.2; tryAttack(p, enemies, 'kick'); }
  }
  if(keys['l']){ keys['l'] = false; doSuper(); }
  // płynne przyspieszanie/hamowanie zamiast skokowej prędkości
  const accel = targetVx !== 0 ? 0.22 : 0.30;
  p.moveVx += (targetVx - p.moveVx) * accel;
  if(Math.abs(p.moveVx) < 0.04) p.moveVx = 0;
  // kurz spod nóg przy biegu
  if(p.onGround && Math.abs(p.moveVx) > 1.6){
    dustT += dt;
    if(dustT > 0.07){ dustT = 0;
      particles.push({x:p.x - Math.sign(p.moveVx)*10*p.scale, y:GROUND, vx:-Math.sign(p.moveVx)*(1+Math.random()*1.5), vy:-Math.random()*1.4, life:0.4, color:'rgba(220,205,175,0.9)'});
    }
  }
  if(p.pose==='punch'&&p.poseT>0.24) p.pose='idle';
  if(p.pose==='kick'&&p.poseT>0.31) p.pose='idle';
  if(p.pose==='hit'&&p.poseT>0.3) p.pose='idle';
  if(moving && (p.pose==='idle'||p.pose==='walk')){ p.pose='walk'; p.walkT += dt*11; }
  else if(!moving && p.pose==='walk'){ if(Math.abs(p.moveVx) < 0.5) p.pose='idle'; else p.walkT += dt*11; }
  physics(p, dt);

  // enemies AI
  for(const e of enemies){
    if(e.pooled && !e.pooledSunk){
      // zbir leci w powietrzu po kopniaku
      e.x += e.vx; e.y += e.vy; e.vy += 0.5; e.rot += 0.28;
      e.x = Math.min(e.x, POOL.x + POOL.w - 40);
      if(e.y >= POOL.top + 30){
        if(e.x > POOL.x){
          e.pooledSunk = true; e.y = POOL.top + 32;
          sndSplash(); shake = Math.max(shake, 6);
          for(let i=0;i<18;i++) splashes.push({x:e.x, y:POOL.top, vx:(Math.random()-0.5)*6, vy:-Math.random()*7-2, life:0.8});
        } else { e.pooled = false; e.y = GROUND; e.rot = 0; e.pose = 'ko'; }
      }
      continue;
    }
    if(e.dead){ continue; }
    const dx = p.x - e.x;
    // AREK: skok + uderzenie w ziemię (fala wstrząsowa)
    if(e.isArek){
      e.specialCd -= dt;
      if(e.pose === 'slam'){
        if(!e.onGround) e.slamAir = true;
        else if(e.slamAir){
          e.slamAir = false; e.pose = 'idle'; e.specialCd = 5 + Math.random()*2;
          shockwave(e);
        }
        physics(e, dt); continue;
      }
      if(e.specialCd <= 0 && Math.abs(dx) < 300 && e.onGround && e.hurtT <= 0){
        e.pose = 'slam'; e.poseT = 0;
        e.vy = -9; e.onGround = false;
        e.vx = Math.sign(dx || 1) * 3;
        physics(e, dt); continue;
      }
    }
    e.facing = Math.sign(dx||1);
    // MIOTACZ: trzyma dystans i rzuca piłkami plażowymi
    if(e.ranged){
      const d = Math.abs(dx);
      if(e.hurtT<=0){
        if(d < 150){ e.vx = -e.facing*e.speed; e.walkT += dt*8; e.pose='walk'; }
        else if(d > 300){ e.vx = e.facing*e.speed; e.walkT += dt*8; e.pose='walk'; }
        else {
          if(e.pose==='walk') e.pose='idle';
          if(e.attackCd<=0){
            e.attackCd = e.cdBase + Math.random()*0.7;
            e.pose='punch'; e.poseT=0;
            balls.push({x:e.x + e.facing*16, y:e.y - 62*e.scale, vx:e.facing*(4.2+Math.random()), vy:-3.2, rot:0, from:'enemy', bounces:0});
            beep(500, 0.07, 'sine', 0.06);
          }
        }
      }
      if(e.pose==='punch'&&e.poseT>0.25) e.pose='idle';
      if(e.pose==='hit'&&e.poseT>0.35) e.pose='idle';
      physics(e, dt);
      continue;
    }
    const range = 46*e.scale + e.stopOff; // każdy staje w trochę innym miejscu
    if(e.hurtT<=0){
      if(Math.abs(dx) > range){ e.vx = e.facing * e.speed; e.walkT += dt*8; if(e.pose==='idle'||e.pose==='walk') e.pose='walk'; }
      else {
        e.pose = e.pose==='walk' ? 'idle' : e.pose;
        if(e.attackCd<=0){
          const kick = Math.random()<0.35;
          e.pose = kick?'kick':'punch'; e.poseT=0;
          e.attackCd = e.isArek ? 1.7 : e.cdBase + Math.random()*0.6;
          e.vx = e.facing * (kick?3:2);
          tryAttack(e, [p], kick?'kick':'punch');
          if(p.hp<=0) break;
        }
      }
    }
    if(e.pose==='punch'&&e.poseT>0.25) e.pose='idle';
    if(e.pose==='kick'&&e.poseT>0.35) e.pose='idle';
    if(e.pose==='hit'&&e.poseT>0.35) e.pose='idle';
    physics(e, dt);
  }

  if(p.hp<=0){
    p.hp = 0; p.dead = true; p.pose='ko';
    startLose();
    return;
  }

  // rozpychanie wrogów — koniec ze zlewaniem się w jedną kupę
  for(let i=0;i<enemies.length;i++){
    const a = enemies[i];
    if(a.dead || a.pooled) continue;
    for(let j=i+1;j<enemies.length;j++){
      const b = enemies[j];
      if(b.dead || b.pooled) continue;
      const minD = 26*(a.scale+b.scale)/2 + 8;
      const d = a.x - b.x;
      if(Math.abs(d) < minD){
        const push = (minD - Math.abs(d)) * 0.5 * (d !== 0 ? Math.sign(d) : (i%2 ? 1 : -1));
        a.x += push; b.x -= push;
        a.x = Math.max(30, Math.min(POOL.x - 15, a.x));
        b.x = Math.max(30, Math.min(POOL.x - 15, b.x));
      }
    }
  }

  // znokautowani znikają po chwili (pole walki bez bałaganu)
  for(const e of enemies){ if(e.dead && !e.pooled && !e.pooledSunk) e.koT += dt; }
  enemies = enemies.filter(e => !(e.dead && !e.pooled && !e.pooledSunk && e.koT > 2.4));

  // piłki plażowe (pociski miotaczy)
  for(const b of balls){
    b.x += b.vx; b.y += b.vy; b.vy += 0.22; b.rot += 0.2;
    if(b.y >= GROUND - 9){ b.y = GROUND - 9; b.vy = -Math.abs(b.vy)*0.55; b.bounces++; }
    if(b.from==='enemy' && Math.abs(b.x - p.x) < 26 && b.y > p.y - 90 && !p.dead){
      if(p.blocking){
        b.from = 'player'; b.vx = -b.vx * 1.15; b.vy = -3.5; b.bounces = 0;
        addPopup(p.x, p.y - 112, 'DEFLECTED! 🏐', '#9adcff');
        beep(1500, 0.08, 'square', 0.08);
      } else if(p.invuln <= 0){
        p.hp -= 5; p.hurtT = 0.4; p.invuln = 0.6; combo = 0; dmgVig = 0.55;
        p.pose = 'hit'; p.poseT = 0; p.vx = Math.sign(b.vx) * 4;
        sndHurt(); b.deadBall = true;
      }
    }
    if(b.from==='player'){
      for(const e of enemies){
        if(e.dead || e.pooled) continue;
        if(Math.abs(b.x - e.x) < 30 && b.y > e.y - 95*e.scale){
          e.hp -= 15; e.hurtT = 0.35; e.pose='hit'; e.poseT=0;
          e.vx = Math.sign(b.vx) * 3 / (e.mass||1);
          addScore(20, e.x, e.y - 95*e.scale);
          addPopup(e.x, e.y - 118*e.scale, 'RICOCHET!', '#ffd43b');
          burst(b.x, b.y, '#ffb300', 8);
          b.deadBall = true;
          if(e.hp <= 0){ e.dead = true; e.pose='ko'; addScore(25, e.x, e.y - 105*e.scale); }
          break;
        }
      }
    }
    if(b.x < -20 || b.x > W + 20 || b.bounces >= 3) b.deadBall = true;
  }
  balls = balls.filter(b=>!b.deadBall);

  // hot-dogi leczące
  for(const it of items){
    it.t += dt;
    if(!it.taken && Math.abs(p.x - it.x) < 30 && p.onGround){
      it.taken = true;
      p.hp = Math.min(p.maxHp, p.hp + 45);
      addPopup(it.x, GROUND - 60, '+45 HP 🌭', '#8bc34a');
      beep(660, 0.1, 'square', 0.09); beep(880, 0.12, 'square', 0.09);
    }
  }
  items = items.filter(it=>!it.taken);

  if(enemies.every(e=>e.dead)){
    wave++;
    addScore(100, player.x, player.y - 130);
    if(wave >= WAVES.length){ startWin(); }
    else {
      items.push({x: 120 + Math.random()*380, t: 0, taken: false});
      spawnWave();
    }
  }
}

function startLose(){
  state='lose';
  balls = [];
  sndLose();
  if(!arek || arek.dead){
    arek = mkFighter(POOL.x - 40, {color:'#0a0a0a', beltColor:'#c00', scale:1.75, speed:1.4, isArek:true, name:'MR AREK'});
    enemies.push(arek);
  }
  cut = {phase:'walk', t:0};
}

function updateLose(dt){
  cut.t += dt;
  const a = arek, p = player;
  if(cut.phase==='walk'){
    const dx = p.x - a.x;
    a.facing = Math.sign(dx||1);
    if(Math.abs(dx) > 30){ a.x += a.facing * 1.8; a.walkT += dt*8; a.pose='walk'; }
    else { cut.phase='lift'; cut.t=0; a.pose='idle'; }
  } else if(cut.phase==='lift'){
    p.carried = true;
    const k = Math.min(1, cut.t/0.8);
    p.x = a.x; p.y = GROUND - k * 95 * a.scale * 0.8;
    p.rot = k * Math.PI/2;
    if(k>=1){ cut.phase='carry'; cut.t=0; }
  } else if(cut.phase==='carry'){
    a.facing = 1; a.x += 1.8; a.walkT += dt*8; a.pose='walk';
    p.x = a.x; p.y = GROUND - 95*a.scale*0.8;
    if(a.x >= POOL.x - 30){ cut.phase='throw'; cut.t=0; a.pose='punch'; a.poseT=0;
      p.vx = 3.2; p.vy = -5; }
  } else if(cut.phase==='throw'){
    p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.rot += 0.25;
    p.x = Math.min(p.x, POOL.x + POOL.w - 70);
    if(p.y >= POOL.top + 30 && p.x > POOL.x){
      cut.phase='sunk'; cut.t=0;
      sndSplash(); shake = 8;
      for(let i=0;i<26;i++) splashes.push({x:p.x, y:POOL.top, vx:(Math.random()-0.5)*7, vy:-Math.random()*8-2, life:0.9});
      p.y = POOL.top + 34;
    }
  } else if(cut.phase==='sunk'){
    // głowa Grega dryfuje w basenie; po chwili zbiry biorą się za Natalkę
    p.y = POOL.top + 34 + Math.sin(time*2)*3;
    if(cut.t > 1.1){
      cut.helpers = [
        mkFighter(girl.x - 130, {color:'#111', beltColor:'#333', facing:1}),
        mkFighter(girl.x - 190, {color:'#111', beltColor:'#333', facing:1})
      ];
      enemies.push(...cut.helpers);
      cut.phase='girlGrab'; cut.t=0;
    }
  } else if(cut.phase==='girlGrab'){
    p.y = POOL.top + 34 + Math.sin(time*2)*3;
    const targets = [girl.x - 36, girl.x - 12];
    let done = true;
    cut.helpers.forEach((h,i)=>{
      const tx = targets[i];
      if(Math.abs(h.x - tx) > 4){ h.x += Math.sign(tx - h.x)*2.2; h.walkT += dt*9; h.pose='walk'; done = false; }
      else h.pose='idle';
    });
    if(done){ cut.phase='girlLift'; cut.t=0; }
  } else if(cut.phase==='girlLift'){
    p.y = POOL.top + 34 + Math.sin(time*2)*3;
    const k = Math.min(1, cut.t/0.7);
    girl.yOff = -55*k; girl.rot = 0.45*k;
    cut.helpers.forEach(h=>{ h.pose='punch'; h.poseT=0.05; }); // ręce w górze — trzymają ją
    if(cut.t > 1.05){ cut.phase='girlThrow'; cut.t=0; girl.vx=2.4; girl.vy=-5.2; }
  } else if(cut.phase==='girlThrow'){
    p.y = POOL.top + 34 + Math.sin(time*2)*3;
    girl.x += girl.vx; girl.yOff += girl.vy; girl.vy += 0.4; girl.rot += 0.22;
    girl.x = Math.min(girl.x, POOL.x + POOL.w - 130);
    if(GROUND + girl.yOff >= POOL.top + 28 && girl.x > POOL.x){
      cut.phase='girlSunk'; cut.t=0; girl.sunk = true;
      sndSplash(); shake = 7;
      for(let i=0;i<22;i++) splashes.push({x:girl.x, y:POOL.top, vx:(Math.random()-0.5)*7, vy:-Math.random()*8-2, life:0.9});
    }
  } else if(cut.phase==='girlSunk'){
    p.y = POOL.top + 34 + Math.sin(time*2)*3;
  }
}

function startWin(){

  girl.saved = false;

}

  } else if(cut.phase==='kneel'){
    // Greg klęka i wyciąga pierścionek

    if(Math.random() < 0.22)
      particles.push({x:p.x + p.facing*24, y:GROUND-54, vx:(Math.random()-0.5)*1.4, vy:-Math.random()*1.4, life:0.5, color:'#fff176'});

      cut.phase='yes'; cut.t=0;
      addPopup(girl.x, GROUND - 165, 'YES! 💍❤️', '#ff5fa2');

      for(let i=0;i<12;i++) hearts.push({x:(p.x+girl.x)/2 + (Math.random()-0.5)*90, y:GROUND-100-Math.random()*60, life:2+Math.random()*1.5});
    }
  } else if(cut.phase==='yes'){
    p.pose='kneel';
    if(Math.random() < 0.12) hearts.push({x:(p.x+girl.x)/2 + (Math.random()-0.5)*100, y:GROUND-110, life:1.5+Math.random()});
    if(cut.t > 2.6){ cut.phase='end'; cut.t=0; }
  } else {
    p.pose='kneel';
    if(Math.random() < 0.05) hearts.push({x:(p.x+girl.x)/2 + (Math.random()-0.5)*70, y:GROUND-110, life:1.5+Math.random()});
  }
}

// ---------- drawing ----------
function drawStick(f){
  const s = f.scale;
  ctx.save();
  if(f===player && f.invuln > 0 && Math.floor(time*24)%2===0) ctx.globalAlpha = 0.45;
  // cień na ziemi (mniejszy, gdy postać wysoko w skoku)
  if(!f.pooled && !f.pooledSunk){
    const air = Math.max(0, GROUND - f.y);
    const sc = Math.max(0.35, 1 - air/240);
    ctx.save();
    ctx.globalAlpha *= 0.28;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(f.x, GROUND+2, 22*s*sc, 6*s*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.translate(f.x, f.y);
  if(f.rot) ctx.rotate(f.rot);
  if(f.pose==='ko' && !f.carried && state!=='lose'){ ctx.rotate(-Math.PI/2); ctx.translate(0, -8*s); }
  if(f.pose==='ko' && state==='lose' && f===player && cut && ['walk'].includes(cut.phase)){ ctx.rotate(-Math.PI/2); ctx.translate(0,-8*s); }
  ctx.scale(f.facing, 1);
  if(f.squash) ctx.scale(1 + f.squash*0.9, 1 - f.squash); // squash & stretch (środek w stopach)
  // linie pędu przy szybkim biegu
  if(f===player && Math.abs(f.vx)>2.5 && f.onGround && state==='fight'){
    ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=2; ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const ly=-(18+i*17)*s;
      ctx.beginPath(); ctx.moveTo(-16*s, ly); ctx.lineTo(-16*s-8-Math.abs(f.vx)*3.4, ly); ctx.stroke();
    }
  }
  const lw = 4.5*s;
  ctx.lineWidth = lw; ctx.lineCap='round';
  ctx.strokeStyle = f.hurtT>0 && Math.floor(time*20)%2===0 ? '#ff5252' : f.color;
  ctx.fillStyle = ctx.strokeStyle;

  const hip = {x:0, y:-38*s};
  const sh  = {x:0, y:-64*s};
  const headY = -78*s, headR = 9.5*s;

  // pozy
  const t = f.poseT;
  const breathe = Math.sin(time*3 + f.x*0.013);
  let armF={a:0.75+breathe*0.06,b:2.2}, armB={a:0.45+breathe*0.04,b:2.0}; // garda bokserska
  let legF={a:0.3,b:0.15}, legB={a:-0.3,b:0.15};
  let lean = 0, bob = breathe*1.3, atkK = 0;
  if(f.pose==='walk'){ const sw=Math.sin(f.walkT); bob = Math.abs(Math.cos(f.walkT))*2.6;
    legF={a:0.55*sw,b:0.35}; legB={a:-0.55*sw,b:0.35};
    armF={a:-0.45*sw+0.35,b:1.5}; armB={a:0.45*sw-0.35,b:1.5}; }
  if(f.pose==='punch'){ const k = t<0.1 ? t/0.1 : Math.max(0,1-(t-0.1)/0.14);
    armF={ext:k}; armB={a:0.5,b:2.3}; lean = 0.1*k; bob = 0; atkK = k;
    legF={a:0.45*k,b:0.2}; legB={a:-0.35*k,b:0.2}; }
  if(f.pose==='kick'){ const k = t<0.13 ? t/0.13 : Math.max(0,1-(t-0.13)/0.18);
    legF={ext:k}; armF={a:1.1,b:0.6}; armB={a:-1.3,b:0.6}; lean = -0.22*k; bob = 0; atkK = k; }
  if(f.pose==='hit'){ armF={a:1.5,b:0.5}; armB={a:1.3,b:0.5}; lean = -0.25; }
  if(f.pose==='block'){ // przedramiona skrzyżowane przed sobą
    armF={a:0.35,b:2.75}; armB={a:0.15,b:2.5}; lean = 0.07; bob = 0; }
  if(f.pose==='kneel'){ // oświadczyny — przyklęk, pierścionek w wyciągniętej ręce
    bob = -13; lean = 0.1;
    legF={a:0.85,b:1.5}; legB={a:-0.15,b:1.35};
    armF={ext:0.75}; armB={a:0.35,b:1.9}; }
  if(f.pose==='slam'){ // obie ręce nad głową, nogi podkulone w locie
    armF={a:2.7,b:2.9}; armB={a:2.5,b:2.8};
    if(!f.onGround){ legF={a:0.9,b:1.1}; legB={a:0.5,b:1.0}; }
    lean = 0.12; bob = 0; }
  if(lean) ctx.rotate(lean);
  if(bob) ctx.translate(0, -bob);

  // ===== renderowanie ciała (wypełnione sylwetki) =====
  const gi = (f===player);
  const hurtFlash = f.hurtT>0 && Math.floor(time*20)%2===0;
  const bodyCol  = hurtFlash ? '#ff6b6b' : f.color;
  const limbCol  = gi ? (hurtFlash?'#ffc4c4':'#e9e9e9') : bodyCol;
  const skin = '#ffcfa0';
  ctx.lineCap='round'; ctx.lineJoin='round';

  function twoSeg(px,py,a1,l1,a2,l2,w){
    const ex=px+Math.cos(a1)*l1, ey=py+Math.sin(a1)*l1;
    const hx=ex+Math.cos(a2)*l2, hy=ey+Math.sin(a2)*l2;
    ctx.lineWidth=w; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(ex,ey); ctx.lineTo(hx,hy); ctx.stroke();
    // staw (łokieć/kolano) — sylwetka wygląda solidnie i „zaprojektowana"
    ctx.beginPath(); ctx.arc(ex,ey,w*0.52,0,Math.PI*2); ctx.fillStyle=ctx.strokeStyle; ctx.fill();
    return {hx,hy};
  }
  const aL=15*s, lL=20*s;
  const armW=(f.isArek?8:6.2)*s, legW=(f.isArek?9.2:7)*s;
  const shW=(f.isArek?14:11.5)*s, hipW=(f.isArek?10.5:8.2)*s;

  // --- NOGI (za tułowiem) ---
  ctx.strokeStyle = limbCol;
  let footF, footB;
  if(legF.ext!==undefined){ const e=legF.ext; footF=twoSeg(hip.x,hip.y,-0.55*e,lL,-0.3*e,lL,legW); }
  else footF=twoSeg(hip.x,hip.y,1.57-legF.a,lL,1.57-legF.b*0.5,lL,legW);
  footB=twoSeg(hip.x,hip.y,1.57-legB.a,lL,1.57-legB.b*0.5,lL,legW);
  ctx.fillStyle = gi ? '#3a3a3a' : '#000';
  [footB,footF].forEach(ft=>{ if(ft){ ctx.save(); ctx.translate(ft.hx,ft.hy); ctx.beginPath(); ctx.ellipse(3*s,1*s,6*s,3.4*s,0,0,Math.PI*2); ctx.fill(); ctx.restore(); } });

  // --- TUŁÓW (wypełniony, barki szersze niż biodra) ---
  ctx.fillStyle = gi ? (hurtFlash?'#ffd6d6':'#f7f7f7') : bodyCol;
  ctx.beginPath();
  ctx.moveTo(-hipW, hip.y);
  ctx.lineTo(-shW, sh.y+3*s);
  ctx.quadraticCurveTo(0, sh.y-4*s, shW, sh.y+3*s);
  ctx.lineTo(hipW, hip.y);
  ctx.quadraticCurveTo(0, hip.y+5*s, -hipW, hip.y);
  ctx.closePath();
  ctx.fill();
  // cieniowanie tułowia + rozcięcie gi (klip do sylwetki)
  ctx.save(); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,0.16)'; ctx.fillRect(2*s, sh.y-8*s, shW+6*s, 46*s);
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(-shW-6*s, sh.y-8*s, 6*s, 46*s);
  if(gi){ ctx.strokeStyle='rgba(0,0,0,.16)'; ctx.lineWidth=1.6*s;
    ctx.beginPath(); ctx.moveTo(1*s,sh.y-2*s); ctx.lineTo(-3*s,hip.y+4*s); ctx.stroke(); }
  ctx.restore();
  // rim light na krawędzi tułowia (lewa krawędź od słońca)
  ctx.strokeStyle = gi ? 'rgba(255,240,200,0.5)' : (f.isArek ? 'rgba(255,90,90,0.55)' : 'rgba(120,200,255,0.45)');
  ctx.lineWidth = 2*s; ctx.beginPath();
  ctx.moveTo(-hipW+1*s, hip.y); ctx.lineTo(-shW+1*s, sh.y+3*s);
  ctx.quadraticCurveTo(0, sh.y-3*s, shW*0.2, sh.y-3.5*s); ctx.stroke();

  // --- PAS ---
  if(f.beltColor){
    ctx.fillStyle=f.beltColor;
    ctx.fillRect(-hipW-1.5*s, hip.y-3.5*s, (hipW+1.5*s)*2, 6*s);
    ctx.fillRect(-2.5*s, hip.y-2*s, 5*s, 12*s); // węzeł
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fillRect(-hipW-1.5*s, hip.y+1.5*s, (hipW+1.5*s)*2, 1.2*s);
  }

  // --- RĘKA TYLNA (za głową) ---
  ctx.strokeStyle = limbCol;
  const handB = twoSeg(sh.x,sh.y,1.57-armB.a,aL,1.57-armB.b,aL,armW);
  ctx.fillStyle = gi ? skin : (f.isArek?'#2a0000':'#1a1a1a');
  ctx.beginPath(); ctx.arc(handB.hx,handB.hy,(f.isArek?5.5:4.4)*s,0,Math.PI*2); ctx.fill();

  // --- GŁOWA ---
  ctx.fillStyle = gi ? skin : bodyCol;
  ctx.beginPath(); ctx.arc(0, headY, headR, 0, Math.PI*2); ctx.fill();
  // miękkie rozjaśnienie od słońca (lewa-góra)
  const hl = ctx.createRadialGradient(-headR*0.4, headY-headR*0.4, 0, -headR*0.4, headY-headR*0.4, headR*1.3);
  hl.addColorStop(0,'rgba(255,255,255,0.28)'); hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.beginPath(); ctx.arc(0, headY, headR, 0, Math.PI*2); ctx.fill();
  // rim light — świetlisty kontur (nowoczesna głębia)
  ctx.strokeStyle = gi ? 'rgba(255,240,200,0.55)' : (f.isArek ? 'rgba(255,90,90,0.6)' : 'rgba(120,200,255,0.5)');
  ctx.lineWidth = 2*s;
  ctx.beginPath(); ctx.arc(0, headY, headR-0.5*s, Math.PI*0.75, Math.PI*1.75); ctx.stroke();

  if(gi){
    // twarz Grega — zdeterminowane oczy + brew + opaska z powiewającą wstążką
    ctx.fillStyle='#233';
    ctx.beginPath(); ctx.arc(3.5*s, headY, 1.6*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8*s, headY, 1.6*s, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#233'; ctx.lineWidth=1.3*s; ctx.beginPath();
    ctx.moveTo(2*s,headY-3*s); ctx.lineTo(9.5*s,headY-3.2*s); ctx.stroke(); // brew
    ctx.beginPath(); ctx.moveTo(3*s,headY+4.5*s); ctx.lineTo(8*s,headY+4.5*s); ctx.stroke(); // usta
    // opaska
    const band = hurtFlash?'#ff8a8a':'#e11';
    ctx.strokeStyle=band; ctx.lineWidth=3.4*s;
    ctx.beginPath(); ctx.arc(0, headY, headR+0.2*s, Math.PI*1.06, Math.PI*1.94); ctx.stroke();
    const fl = Math.sin(time*7+f.x*0.02)*4*s;
    ctx.lineWidth=3*s; ctx.beginPath();
    ctx.moveTo(-headR+1*s, headY-3*s);
    ctx.quadraticCurveTo(-headR-9*s, headY-1*s+fl, -headR-15*s, headY+4*s+fl*1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-headR+1*s, headY-1*s);
    ctx.quadraticCurveTo(-headR-8*s, headY+3*s-fl, -headR-13*s, headY+8*s-fl);
    ctx.stroke();
  } else {
    // wrogowie — wściekłe świecące oczy + kolorowa opaska
    const eyeCol = f.isArek ? '#ff2020' : '#ffdd33';
    if(f.isArek){ ctx.shadowColor='#ff0000'; ctx.shadowBlur=8; }
    ctx.fillStyle=eyeCol;
    ctx.beginPath(); ctx.arc(3.5*s, headY-0.5*s, (f.isArek?2.3:1.8)*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8*s, headY-0.5*s, (f.isArek?2.3:1.8)*s, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // gniewne brwi
    ctx.strokeStyle = f.beltColor || '#555'; ctx.lineWidth=2*s;
    ctx.beginPath(); ctx.moveTo(1.5*s,headY-4.5*s); ctx.lineTo(5.5*s,headY-2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6*s,headY-2*s); ctx.lineTo(10*s,headY-4.5*s); ctx.stroke();
    // opaska w kolorze pasa
    if(f.beltColor){ ctx.strokeStyle=f.beltColor; ctx.lineWidth=3*s;
      ctx.beginPath(); ctx.arc(0, headY, headR+0.2*s, Math.PI*1.08, Math.PI*1.92); ctx.stroke(); }
  }

  // smuga uderzenia (swoosh)
  if(atkK > 0.3){
    ctx.strokeStyle='rgba(255,255,255,'+(0.55*atkK).toFixed(2)+')';
    ctx.lineWidth=3.5*s; ctx.lineCap='round';
    const swR=(f.pose==='kick'?33:26)*s, swY=(f.pose==='kick'? -32*s : -58*s);
    ctx.beginPath(); ctx.arc(4*s, swY, swR, -0.85, 0.55); ctx.stroke();
    ctx.lineWidth=2*s;
    ctx.beginPath(); ctx.arc(4*s, swY, swR*0.72, -0.7, 0.4); ctx.stroke();
  }

  // --- RĘKA PRZEDNIA (na wierzchu — cios czytelny) ---
  ctx.strokeStyle = limbCol;
  let handF;
  if(armF.ext!==undefined){ const e=armF.ext; handF=twoSeg(sh.x,sh.y,-0.1,aL*(0.6+0.4*e),-0.05,aL*(0.6+0.4*e),armW); }
  else handF=twoSeg(sh.x,sh.y,1.57-armF.a,aL,1.57-armF.b,aL,armW);
  ctx.fillStyle = gi ? skin : (f.isArek?'#2a0000':'#1a1a1a');
  ctx.beginPath(); ctx.arc(handF.hx,handF.hy,(f.isArek?5.5:4.4)*s,0,Math.PI*2); ctx.fill();
  if(f.pose==='punch' && armF.ext>0.6){ // błysk przy pełnym wyproście ciosu
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.arc(handF.hx+4*s,handF.hy,3*s,0,Math.PI*2); ctx.fill();
  }
  if(f.pose==='kneel' && f===player){ // pierścionek zaręczynowy 💍
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2.4*s;
    ctx.beginPath(); ctx.arc(handF.hx+2*s, handF.hy-7*s, 4*s, 0, Math.PI*2); ctx.stroke();
    const gl = 0.5 + 0.5*Math.sin(time*9);
    ctx.fillStyle='rgba(190,240,255,'+gl.toFixed(2)+')';
    ctx.beginPath(); ctx.arc(handF.hx+2*s, handF.hy-12*s, 2.2*s, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,'+(gl*0.8).toFixed(2)+')'; ctx.lineWidth=1.2*s;
    ctx.beginPath();
    ctx.moveTo(handF.hx+2*s-5*s, handF.hy-12*s); ctx.lineTo(handF.hx+2*s+5*s, handF.hy-12*s);
    ctx.moveTo(handF.hx+2*s, handF.hy-17*s); ctx.lineTo(handF.hx+2*s, handF.hy-7*s);
    ctx.stroke();
  }

  ctx.restore();

  // pasek HP nad głową (w walce)
  if(state==='fight' && !f.dead && f!==player){
    const bw = 40*f.scale;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(f.x-bw/2, f.y-100*f.scale, bw, 5);
    ctx.fillStyle = f.isArek ? '#e11' : '#ff9800';
    ctx.fillRect(f.x-bw/2, f.y-100*f.scale, bw*Math.max(0,f.hp/f.maxHp), 5);
  }
  // imię nad głową (duże i czytelne)
  if(f.name && !f.dead){
    const ny = f.y - 96*f.scale - 16;
    ctx.font = '900 ' + (f.isArek?32:26) + 'px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
    ctx.textAlign='center';
    ctx.lineWidth = 6.5; ctx.strokeStyle = 'rgba(0,0,0,.8)'; ctx.lineJoin='round';
    ctx.strokeText(f.name, f.x, ny);
    ctx.fillStyle = f.isArek ? '#ff5252' : (f===player ? '#fff' : '#ffd43b');
    ctx.fillText(f.name, f.x, ny);
  }
}

function rr(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function wrapText(txt, x, y, maxW, lh){
  const words = txt.split(' ');
  let line = '', yy = y;
  for(const w of words){
    const test = line ? line + ' ' + w : w;
    if(ctx.measureText(test).width > maxW){ ctx.fillText(line, x, yy); line = w; yy += lh; }
    else line = test;
  }
  ctx.fillText(line, x, yy);
}

function bubble(x, y, txt){
  // dymek dialogowy z ogonkiem; y = dolna krawędź dymka
  ctx.font='700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  const w = ctx.measureText(txt).width + 26;
  const bx = Math.max(10, Math.min(W - 10 - w, x - w/2));
  rr(bx, y - 30, w, 30, 12);
  ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.96)';
  ctx.beginPath(); ctx.moveTo(x-6, y-1); ctx.lineTo(x+6, y-1); ctx.lineTo(x, y+8); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1a2038'; ctx.textAlign='center';
  ctx.fillText(txt, bx + w/2, y - 10);
}

function nameTag(text, x, y, color){
  ctx.font = '900 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial'; ctx.textAlign='center';
  ctx.lineWidth = 6.5; ctx.strokeStyle = 'rgba(0,0,0,.8)'; ctx.lineJoin='round';
  ctx.strokeText(text, x, y);
  ctx.fillStyle = color; ctx.fillText(text, x, y);
}

function drawGirl(){
  const g = girl;
  if(g.sunk){
    // tylko głowa Natalki nad wodą — blond włosy i okulary
    const hy = POOL.top + 30 + Math.sin(time*2.3)*3;
    ctx.fillStyle='#ffd9b3'; ctx.beginPath(); ctx.arc(g.x, hy, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd43b'; ctx.beginPath(); ctx.arc(g.x, hy-2, 11, Math.PI*0.95, Math.PI*2.05); ctx.fill();
    ctx.strokeStyle='#222'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.arc(g.x-4, hy+1, 3.4, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(g.x+4, hy+1, 3.4, 0, Math.PI*2); ctx.stroke();
    nameTag('NATALKA', g.x, POOL.top - 12, '#ff9ec6');
    return;
  }
  const cheer = state==='fight' && combo >= 3;
  const happy = (state==='win' && girl.saved) || cheer || (state==='story' && storyIdx===0);
  const hopNow = cheer || (state==='win' && cut && cut.phase==='yes');
  // cień
  if(!g.rot){ ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(g.x, g.y+2, 18, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
  ctx.save();
  ctx.translate(g.x, g.y + g.yOff);
  if(g.rot) ctx.rotate(g.rot);
  const panic = state==='fight' ? Math.sin(g.panicT*6)*2 : 0;
  ctx.translate(panic, hopNow ? -Math.abs(Math.sin(g.panicT*7))*(cheer?8:12) : 0);
  const s = 1.4;
  ctx.lineCap='round'; ctx.lineJoin='round';
  const headY=-74*s, headR=9.5*s;
  const skin='#ffd9b3';

  // NOGI
  ctx.strokeStyle=skin; ctx.lineWidth=5*s;
  ctx.beginPath(); ctx.moveTo(-5*s,-28*s); ctx.lineTo(-6*s,-2*s); ctx.moveTo(5*s,-28*s); ctx.lineTo(6*s,-2*s); ctx.stroke();
  ctx.fillStyle='#c0392b'; // sandałki
  ctx.beginPath(); ctx.ellipse(-6*s,-1*s,4.5*s,2.6*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6*s,-1*s,4.5*s,2.6*s,0,0,Math.PI*2); ctx.fill();

  // SUKIENKA (różowa, wypełniona z cieniem)
  ctx.fillStyle='#ff5fa2';
  ctx.beginPath();
  ctx.moveTo(-7*s,-58*s); ctx.lineTo(7*s,-58*s);
  ctx.lineTo(15*s,-26*s); ctx.quadraticCurveTo(0,-22*s,-15*s,-26*s);
  ctx.closePath(); ctx.fill();
  ctx.save(); ctx.clip(); ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(1*s,-58*s,16*s,40*s); ctx.restore();
  // ramiączka
  ctx.strokeStyle='#ff8ac0'; ctx.lineWidth=2.4*s;
  ctx.beginPath(); ctx.moveTo(-6*s,-58*s); ctx.lineTo(-3*s,-64*s); ctx.moveTo(6*s,-58*s); ctx.lineTo(3*s,-64*s); ctx.stroke();

  // RĘCE
  ctx.strokeStyle=skin; ctx.lineWidth=4.2*s;
  const armUp = state==='fight' || state==='lose' || (state==='story' && storyIdx>=1);
  if(happy){ // ręce w górze z radości
    const wv=Math.sin(g.panicT*7)*4*s;
    twoSegG(-6*s,-54*s, -13*s,-70*s, -18*s,-84*s+wv);
    twoSegG(6*s,-54*s, 13*s,-70*s, 18*s,-84*s-wv);
  } else if(armUp){ // panika — ręce w górze, machają
    const wv=Math.sin(g.panicT*8)*5*s;
    twoSegG(-6*s,-54*s, -14*s,-66*s, -17*s,-80*s+wv);
    twoSegG(6*s,-54*s, 14*s,-66*s, 17*s,-80*s-wv);
  } else {
    twoSegG(-6*s,-54*s, -12*s,-44*s, -14*s,-34*s);
    twoSegG(6*s,-54*s, 12*s,-44*s, 14*s,-34*s);
  }
  function twoSegG(x0,y0,x1,y1,x2,y2){
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(x2,y2,3*s,0,Math.PI*2); ctx.fill();
  }

  // GŁOWA
  ctx.fillStyle=skin;
  ctx.beginPath(); ctx.arc(0,headY,headR,0,Math.PI*2); ctx.fill();
  // włosy blond (za głową + kucyki po bokach)
  ctx.fillStyle='#ffd43b';
  ctx.beginPath(); ctx.arc(0,headY-2*s,headR+2.5*s,Math.PI*0.92,Math.PI*2.08); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-headR-1*s,headY+9*s,4*s,12*s,0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(headR+1*s,headY+9*s,4*s,12*s,-0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.25)'; // połysk włosów
  ctx.beginPath(); ctx.arc(-3*s,headY-6*s,4*s,Math.PI,Math.PI*2); ctx.fill();
  // grzywka
  ctx.fillStyle='#ffd43b';
  ctx.beginPath(); ctx.moveTo(-headR+1*s,headY-3*s);
  ctx.quadraticCurveTo(0,headY-headR-2*s, headR-1*s,headY-3*s);
  ctx.quadraticCurveTo(0,headY-1*s,-headR+1*s,headY-3*s); ctx.fill();
  // OKULARY
  ctx.strokeStyle='#222'; ctx.lineWidth=1.9*s;
  ctx.fillStyle='rgba(180,220,255,.5)';
  ctx.beginPath(); ctx.arc(-4*s, headY+1.5*s, 3.6*s, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(4*s, headY+1.5*s, 3.6*s, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-0.6*s,headY+1.5*s); ctx.lineTo(0.6*s,headY+1.5*s); ctx.stroke();
  // usta
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=1.7*s;
  if(happy){ ctx.beginPath(); ctx.arc(0, headY+5*s, 3*s, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke(); }
  else { ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.ellipse(0, headY+6*s, 1.8*s, 2.4*s, 0, 0, Math.PI*2); ctx.fill(); }
  // rumieńce
  ctx.fillStyle='rgba(255,120,150,.4)';
  ctx.beginPath(); ctx.arc(-7*s,headY+4*s,2*s,0,Math.PI*2); ctx.arc(7*s,headY+4*s,2*s,0,Math.PI*2); ctx.fill();
  ctx.restore();
  nameTag('NATALKA', g.x, g.y + g.yOff - 132, '#ff9ec6');
}

    ctx.fillStyle='#ff8fc8'; // szyja + głowa flaminga
    ctx.beginPath(); ctx.moveTo(-6,2); ctx.quadraticCurveTo(-16,-16,-8,-22); ctx.quadraticCurveTo(-2,-26,-3,-18);
    ctx.quadraticCurveTo(-6,-12,-2,2); ctx.closePath(); ctx.fill();

const ZOOM = 1.18; // przybliżenie kamery — postacie wypełniają kadr, mniej pustego nieba
function draw(){
  ctx.save();
  ctx.translate(OX, 0);
  if(shake>0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  // ---- ŚWIAT (zoom bazowy + uderzeniowy zoom + delikatny dryf kamery za graczem) ----
  ctx.save();
  const z = ZOOM + camPunch;
  const camX = (state==='fight' && player) ? (player.x - W/2) * 0.06 : 0;
  ctx.translate(W/2, GROUND+18); ctx.scale(z, z); ctx.translate(-W/2 - camX, -(GROUND+18));
  drawScene();

  // plansze fabularne
  if(state==='story'){
    drawGirl();
    if(storyIdx>=1 && storyCast){
      drawStick(storyCast.arek);
      for(const e of enemies) drawStick(e);
    }
    if(storyIdx>=2) drawStick(player);
    ctx.restore();      // koniec zoomu
    drawStoryPanel();   // panel UI w normalnej skali
    ctx.restore();
    return;
  }

  // dziewczyna (nie rysuj w basenie podczas lose — stoi z boku przerażona)
  drawGirl();

  // wrogowie
  for(const e of enemies){
    if(e.pooledSunk){
      // czarna głowa zbira dryfuje w basenie
      const hy = POOL.top + 32 + Math.sin(time*2.1 + e.x*0.05)*3;
      ctx.strokeStyle='#111'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(e.x, hy, 9, 0, Math.PI*2); ctx.stroke();
      continue;
    }
    if(e.pooled){ drawStick(e); continue; }
    if(e.dead && state==='fight'){ // KO leżący + gwiazdki, powoli znika
      const fade = Math.max(0, 1 - e.koT/2.4);
      ctx.save(); ctx.globalAlpha = 0.55*fade; drawStick(e); ctx.restore();
      ctx.save(); ctx.globalAlpha = fade;
      ctx.translate(e.x, GROUND - 30*e.scale); ctx.font='13px Arial'; ctx.textAlign='center';
      for(let i=0;i<3;i++){ const a = time*4 + i*2.1; ctx.fillText('⭐', Math.cos(a)*15*e.scale, Math.sin(a)*5 - 4); }
      ctx.restore();
    } else drawStick(e);
  }
  // gracz
  if(state==='lose' && cut && ['sunk','girlGrab','girlLift','girlThrow','girlSunk'].includes(cut.phase)){
    // tylko głowa Grega nad wodą
    ctx.save();
    ctx.strokeStyle='#f5f5f5'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#e11'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(player.x-10, player.y-3); ctx.lineTo(player.x+10, player.y-3); ctx.stroke();
    ctx.restore();
    nameTag('GREG', player.x, POOL.top - 12, '#fff');
  } else drawStick(player);

  // dymki oświadczyn po zwycięstwie
  if(state==='win' && cut && ['kneel','yes','end'].includes(cut.phase)){
    bubble(player.x, GROUND - 152, '💍 Natalka… will you marry me?');
    if(cut.phase !== 'kneel') bubble(girl.x, GROUND - 198, 'YES! YES! ❤️');
  }

  // błyski uderzeń — świetlna poświata + biały rozbłysk (additive)
  ctx.globalCompositeOperation = 'lighter';
  for(const h of hitFx){
    const k = Math.max(0, h.life/0.22);
    const g = ctx.createRadialGradient(h.x,h.y,0,h.x,h.y,h.r*2.4);
    g.addColorStop(0,'rgba(255,255,220,'+(0.55*k).toFixed(2)+')');
    g.addColorStop(0.5,'rgba(255,190,80,'+(0.28*k).toFixed(2)+')');
    g.addColorStop(1,'rgba(255,160,40,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(h.x,h.y,h.r*2.4,0,Math.PI*2); ctx.fill();
    // pierścień uderzenia
    ctx.strokeStyle='rgba(255,255,255,'+(0.7*k).toFixed(2)+')'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(h.x,h.y,h.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  // cząsteczki
  for(const p of particles){ ctx.globalAlpha = Math.max(0,p.life/0.6); ctx.fillStyle=p.color; ctx.fillRect(p.x-2,p.y-2,4,4); }
  ctx.globalAlpha = 1;
  for(const s of splashes){ ctx.globalAlpha = Math.max(0,s.life/0.9); ctx.fillStyle='#7fd4ff'; ctx.beginPath(); ctx.arc(s.x,s.y,3,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha = 1;
  // fale wstrząsowe Arka
  for(const s of shocks){
    ctx.globalAlpha = Math.max(0, s.life/0.55);
    ctx.strokeStyle='#ffb300'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.ellipse(s.x, GROUND, s.r, s.r*0.22, 0, Math.PI, Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(s.x, GROUND, s.r*0.7, s.r*0.15, 0, Math.PI, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.font='20px Arial'; ctx.textAlign='center';
  for(const h of hearts){ ctx.globalAlpha = Math.min(1,h.life); ctx.fillText('❤️', h.x, h.y); }
  ctx.globalAlpha = 1;
  // piłki plażowe w locie
  for(const b of balls){
    ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
    ['#e63946','#ffb703','#2a9d8f'].forEach((c,i)=>{
      ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(0,0);
      ctx.arc(0,0,9, i*2.1, i*2.1+1.05); ctx.closePath(); ctx.fill();
    });
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  // dymki punktów
  for(const p of popups){
    ctx.globalAlpha = Math.min(1, p.life*1.6);
    ctx.font='bold 17px Arial'; ctx.textAlign='center'; ctx.lineJoin='round';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.7)';
    ctx.strokeText(p.txt, p.x, p.y);
    ctx.fillStyle=p.color; ctx.fillText(p.txt, p.x, p.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore(); // ---- koniec ŚWIATA (zoom); UI poniżej w normalnej skali ----

  // winieta — delikatne przyciemnienie rogów (kinowy sznyt), pod HUD
  const vig = ctx.createRadialGradient(W/2, H*0.46, H*0.35, W/2, H*0.5, H*0.95);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(10,14,30,0.32)');
  ctx.fillStyle=vig; ctx.fillRect(-OX,0,VW,H);
  // czerwona winieta bólu (gdy Greg oberwie)
  if(dmgVig > 0){
    const rv = ctx.createRadialGradient(W/2, H*0.5, H*0.3, W/2, H*0.5, H*0.85);
    rv.addColorStop(0,'rgba(255,0,0,0)'); rv.addColorStop(1,'rgba(220,20,20,'+(0.5*dmgVig).toFixed(2)+')');
    ctx.fillStyle=rv; ctx.fillRect(-OX,0,VW,H);
  }
  // przygaszenie przy slow-motion (nokaut bossa)
  if(slowmo > 0){ ctx.fillStyle='rgba(20,10,40,'+(0.18*Math.min(1,slowmo)).toFixed(2)+')'; ctx.fillRect(-OX,0,VW,H); }

  // błysk super-ciosu
  if(flashT>0){ ctx.fillStyle='rgba(255,255,240,'+Math.min(0.65,flashT*2.2).toFixed(2)+')'; ctx.fillRect(-OX,0,VW,H); }

  // HUD — panel gracza (szkło)
  const F = '-apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  rr(16,14,266,58,15);
  ctx.fillStyle='rgba(10,14,30,.6)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='700 12.5px '+F; ctx.textAlign='left';
  ctx.fillText('🥋 GREG — THE WHITE WARRIOR', 30, 33);
  rr(30,41,238,17,8.5); ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fill();
  const hpF = Math.max(0, player.hp/player.maxHp);
  // biały „ślad" obrażeń dogania z opóźnieniem
  if(hpGhost > hpF + 0.001){
    rr(30,41,Math.max(14,238*hpGhost),17,8.5);
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();
  }
  if(hpF>0){
    rr(30,41,Math.max(14,238*hpF),17,8.5);
    const hg=ctx.createLinearGradient(30,0,268,0);
    if(hpF>0.5){ hg.addColorStop(0,'#38c96f'); hg.addColorStop(1,'#9fe855'); }
    else if(hpF>0.25){ hg.addColorStop(0,'#ffab00'); hg.addColorStop(1,'#ffd24d'); }
    else { hg.addColorStop(0,'#ff4444'); hg.addColorStop(1,'#ff7a59'); }
    ctx.fillStyle=hg; ctx.fill();
  }
  rr(30,41,238,17,8.5); ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='700 10.5px '+F; ctx.textAlign='center';
  ctx.fillText(Math.max(0,player.hp)+' / '+player.maxHp, 149, 54);
  // pasek SUPER (ładowany trafieniami)
  rr(30,63,238,6,3); ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fill();
  if(superCharge>0){
    rr(30,63,Math.max(6,238*superCharge/100),6,3);
    ctx.fillStyle = superCharge>=100 ? '#fff176' : '#e0a800'; ctx.fill();
  }
  if(superCharge>=100 && state==='fight'){
    const stxt = touchUI ? '⚡ SUPER READY — tap ⚡' : '⚡ SUPER READY — press L';
    ctx.font='800 12px '+F; ctx.textAlign='left'; ctx.lineJoin='round';
    ctx.lineWidth=3.5; ctx.strokeStyle='rgba(0,0,0,.65)';
    ctx.strokeText(stxt, 30, 89);
    ctx.fillStyle='rgba(255,241,118,'+(0.55+0.45*Math.sin(time*8)).toFixed(2)+')';
    ctx.fillText(stxt, 30, 89);
  }

  // wynik + rekord (pigułka)
  rr(W/2-132,14,264,32,16);
  ctx.fillStyle='rgba(10,14,30,.6)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.font='700 14px '+F; ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.fillText('SCORE  ' + score, W/2-64, 35);
  ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(W/2-1,20,2,20);
  ctx.fillStyle='#ffd43b'; ctx.fillText('BEST  ' + hiScore, W/2+64, 35);
  // combo
  if(combo >= 2 && state==='fight'){
    const cs = 22 + Math.min(combo,10)*1.5 + Math.sin(time*10)*2;
    ctx.font='bold ' + cs + 'px Arial'; ctx.lineJoin='round';
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.7)';
    ctx.strokeText('COMBO x' + combo + '!', 150, 105);
    ctx.fillStyle = combo>=5 ? '#ff5252' : '#ffd43b';
    ctx.fillText('COMBO x' + combo + '!', 150, 105);
  }

  if(state==='fight'){
    // pigułka fali (na dotyku pod wynikiem, żeby nie kolidowała z przyciskami)
    const wl = WAVES[wave] ? WAVES[wave].label : '';
    ctx.font='700 13px '+F;
    const ww = Math.max(120, ctx.measureText(wl).width + 36);
    const wx = touchUI ? W/2-ww/2 : W-ww-16, wy = touchUI ? 52 : 14;
    rr(wx, wy, ww, 30, 15);
    ctx.fillStyle='rgba(10,14,30,.6)'; ctx.fill();
    ctx.strokeStyle='rgba(255,212,59,.4)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle='#ffd43b'; ctx.textAlign='center';
    ctx.fillText(wl, wx+ww/2, wy+20);
    if(msgT>0 && WAVES[wave]){
      const a = Math.min(1, msgT);
      ctx.fillStyle='rgba(255,255,255,'+a.toFixed(2)+')';
      ctx.font='900 38px '+F; ctx.lineJoin='round';
      ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,'+(a*0.4).toFixed(2)+')';
      ctx.strokeText(WAVES[wave].label, W/2, 180);
      ctx.fillText(WAVES[wave].label, W/2, 180);
      ctx.font='italic 600 18px '+F;
      ctx.fillStyle='rgba(255,222,150,'+a.toFixed(2)+')';
      ctx.fillText(WAVES[wave].q || '', W/2, 212);
    }
    // pasek HP bossa (Mr Arek)
    if(arek && !arek.dead && enemies.includes(arek)){
      const bx=W/2-180, bw=360, by=H-32;
      rr(bx-6, by-8, bw+12, 32, 14);
      ctx.fillStyle='rgba(10,14,30,.65)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1.2; ctx.stroke();
      rr(bx, by, bw, 14, 7); ctx.fillStyle='rgba(255,60,60,.15)'; ctx.fill();
      const bf=Math.max(0, arek.hp/arek.maxHp);
      if(bf>0){
        rr(bx, by, Math.max(12,bw*bf), 14, 7);
        const bg=ctx.createLinearGradient(bx,0,bx+bw,0);
        bg.addColorStop(0,'#ff2020'); bg.addColorStop(1,'#ff7b00');
        ctx.fillStyle=bg; ctx.fill();
      }
      ctx.fillStyle='#fff'; ctx.font='800 12px '+F; ctx.textAlign='center';
      ctx.fillText('💀 MR AREK 💀', W/2, by-12);
    }
  }

  ctx.textAlign='center';
  if(state==='win' && cut && cut.phase==='end'){
    overlay('💍 SHE SAID YES! 💍', 'Greg saved Natalka — and won her heart! ❤️', 'Tap or press R to play again');
  } else if(state==='lose' && cut && cut.phase==='girlSunk' && cut.t>0.6){
    overlay('💀 GREG, YOU LOSER! 💀', 'They threw Natalka into the water and you failed to protect her! 🌊', 'Tap or press R to try again');
  }
  if(paused) overlay('⏸ PAUSED', 'Greg is catching his breath…', 'Press P to resume');

  ctx.restore();
}

function overlay(big, mid, small){
  ctx.fillStyle='rgba(8,10,24,.6)'; ctx.fillRect(-OX,0,VW,H);
  const cw=600, ch=200, cx=W/2-cw/2, cy=H/2-118;
  rr(cx, cy, cw, ch, 22);
  ctx.fillStyle='rgba(18,24,48,.85)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.16)'; ctx.lineWidth=1.5; ctx.stroke();
  rr(cx, cy, cw, 4, 2); ctx.fillStyle='#ffd43b'; ctx.fill();
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='900 40px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  ctx.fillText(big, W/2, cy+74);
  ctx.font='600 19px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial'; ctx.fillStyle='#ffd43b';
  wrapText(mid, W/2, cy+114, cw-70, 26); // textAlign=center → linie wyśrodkowane
  ctx.font='500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  ctx.fillStyle='rgba(255,255,255,'+(0.55+0.35*Math.sin(time*4)).toFixed(2)+')';
  ctx.fillText(small, W/2, cy+ch-26);
}

function drawStoryPanel(){
  const sl = STORY[Math.min(storyIdx, STORY.length-1)];
  const vg = ctx.createLinearGradient(0, H-220, 0, H);
  vg.addColorStop(0,'rgba(8,10,24,0)'); vg.addColorStop(1,'rgba(8,10,24,.8)');
  ctx.fillStyle=vg; ctx.fillRect(-OX, H-220, VW, 220);
  const cw=660, ch=112, cx=W/2-cw/2, cy=H-158;
  rr(cx, cy, cw, ch, 18);
  ctx.fillStyle='rgba(16,22,44,.85)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.16)'; ctx.lineWidth=1.4; ctx.stroke();
  ctx.textAlign='left';
  ctx.fillStyle='#ffd43b'; ctx.font='800 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  ctx.fillText(sl.t, cx+26, cy+34);
  ctx.fillStyle='#e8ecff'; ctx.font='500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  wrapText(sl.s, cx+26, cy+60, cw-52, 21);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,'+(0.5+0.4*Math.sin(time*4)).toFixed(2)+')';
  ctx.font='600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';
  ctx.fillText('TAP or press any key ▸   ' + (Math.min(storyIdx,STORY.length-1)+1) + ' / ' + STORY.length, W/2, cy+ch+26);
  if(storyIdx===0){
    ctx.font='900 56px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial'; ctx.lineJoin='round';
    ctx.lineWidth=10; ctx.strokeStyle='rgba(0,0,0,.45)';
    ctx.strokeText('POOLSIDE KARATE', W/2, 150);
    const tg=ctx.createLinearGradient(W/2-280,0,W/2+280,0);
    tg.addColorStop(0,'#ffd43b'); tg.addColorStop(0.5,'#ff9c00'); tg.addColorStop(1,'#ff5fa2');
    ctx.fillStyle=tg; ctx.fillText('POOLSIDE KARATE', W/2, 150);
    ctx.font='600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial'; ctx.fillStyle='#fff';
    ctx.fillText('— a tiny beach beat’em-up —', W/2, 182);
  }
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
